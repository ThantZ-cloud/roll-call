<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Roll Call - Admin Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      color: #fff;
      min-height: 100vh;
    }

    /* ── Top Nav ───────────────────────── */
    .topbar {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(12px);
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .topbar h1 { font-size: 20px; }
    .topbar .ip-badge {
      background: rgba(76,175,80,0.3);
      border: 1px solid rgba(76,175,80,0.5);
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 13px;
      color: #a5d6a7;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 20px;
    }

    /* ── Tabs ──────────────────────────── */
    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
      overflow-x: auto;
    }
    .tab-btn {
      padding: 10px 20px;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 12px;
      background: rgba(255,255,255,0.05);
      color: rgba(255,255,255,0.7);
      cursor: pointer;
      font-size: 14px;
      white-space: nowrap;
      transition: all 0.2s;
    }
    .tab-btn:hover { background: rgba(255,255,255,0.1); }
    .tab-btn.active {
      background: linear-gradient(135deg, #ff8fa3, #ff6b8a);
      color: #fff;
      border-color: transparent;
    }

    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* ── Cards ─────────────────────────── */
    .card {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 16px;
    }
    .card h2 { font-size: 18px; margin-bottom: 16px; }

    /* ── Form Elements ─────────────────── */
    .form-row {
      display: flex;
      gap: 10px;
      margin-bottom: 12px;
    }
    input, select {
      padding: 12px 14px;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 10px;
      background: rgba(255,255,255,0.08);
      color: #fff;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus, select:focus { border-color: #ff8fa3; }
    input::placeholder { color: rgba(255,255,255,0.4); }
    select option { background: #1a1a2e; color: #fff; }

    .input-full { width: 100%; }

    /* ── Buttons ───────────────────────── */
    .btn {
      padding: 12px 20px;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .btn:hover { transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }

    .btn-primary {
      background: linear-gradient(135deg, #ff8fa3, #ff6b8a);
      color: #fff;
    }
    .btn-success {
      background: linear-gradient(135deg, #66bb6a, #43a047);
      color: #fff;
    }
    .btn-danger {
      background: linear-gradient(135deg, #ef5350, #e53935);
      color: #fff;
    }
    .btn-outline {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.3);
      color: #fff;
    }
    .btn-sm { padding: 8px 14px; font-size: 13px; }

    /* ── Lists ─────────────────────────── */
    .list-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      margin-bottom: 8px;
      transition: background 0.2s;
    }
    .list-item:hover { background: rgba(255,255,255,0.08); }
    .list-item .info { flex: 1; }
    .list-item .name { font-weight: 600; font-size: 15px; }
    .list-item .meta { font-size: 13px; color: rgba(255,255,255,0.5); margin-top: 2px; }

    /* ── Subject Cards ─────────────────── */
    .subject-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }
    .subject-card {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 14px;
      padding: 20px;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
    }
    .subject-card:hover {
      background: rgba(255,255,255,0.12);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.2);
    }
    .subject-card .subject-name { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
    .subject-card .subject-meta { font-size: 13px; color: rgba(255,255,255,0.5); }
    .subject-card .delete-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      background: rgba(244,67,54,0.2);
      border: none;
      color: #ef9a9a;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 14px;
      display: none;
    }
    .subject-card:hover .delete-btn { display: flex; align-items: center; justify-content: center; }

    /* ── Live Roll Call ─────────────────── */
    .live-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(244,67,54,0.2);
      border: 1px solid rgba(244,67,54,0.4);
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 13px;
      color: #ef9a9a;
      margin-bottom: 16px;
    }
    .live-badge .dot {
      width: 8px;
      height: 8px;
      background: #f44336;
      border-radius: 50%;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .count-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 18px;
      background: rgba(76,175,80,0.1);
      border: 1px solid rgba(76,175,80,0.2);
      border-radius: 12px;
      margin-bottom: 16px;
      font-size: 16px;
    }
    .count-bar .num { font-weight: 700; font-size: 24px; color: #a5d6a7; }

    /* ── Submission list ───────────────── */
    .sub-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      background: rgba(255,255,255,0.05);
      border-radius: 10px;
      margin-bottom: 6px;
      animation: slideIn 0.3s ease;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-20px); }
      to { opacity: 1; transform: translateX(0); }
    }
    .sub-item .check { color: #66bb6a; font-size: 18px; }
    .sub-item .sub-name { flex: 1; font-weight: 500; }
    .sub-item .sub-roll { color: rgba(255,255,255,0.6); font-size: 13px; }
    .sub-item .sub-time { color: rgba(255,255,255,0.4); font-size: 12px; }
    .sub-item .sub-method {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 10px;
      background: rgba(255,152,0,0.2);
      color: #ffcc80;
    }
    .sub-item .sub-method.self { background: rgba(76,175,80,0.2); color: #a5d6a7; }

    /* ── Actions row ───────────────────── */
    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    /* ── Empty state ───────────────────── */
    .empty {
      text-align: center;
      padding: 30px;
      color: rgba(255,255,255,0.4);
    }
    .empty .emoji { font-size: 40px; margin-bottom: 10px; }

    /* ── Toast ──────────────────────────── */
    .toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      padding: 14px 20px;
      border-radius: 12px;
      font-size: 14px;
      z-index: 100;
      animation: toastIn 0.3s ease, toastOut 0.3s ease 2.7s;
      max-width: 300px;
    }
    .toast.success { background: #43a047; color: #fff; }
    .toast.error { background: #e53935; color: #fff; }
    @keyframes toastIn { from { opacity: 0; transform: translateY(20px); } }
    @keyframes toastOut { to { opacity: 0; transform: translateY(20px); } }

    /* ── Back button ───────────────────── */
    .back-btn {
      background: none;
      border: none;
      color: rgba(255,255,255,0.7);
      cursor: pointer;
      font-size: 14px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .back-btn:hover { color: #fff; }

    /* ── Responsive ────────────────────── */
    @media (max-width: 600px) {
      .container { padding: 12px; }
      .card { padding: 18px; }
      .form-row { flex-direction: column; }
      .subject-grid { grid-template-columns: 1fr; }
      .actions { flex-direction: column; }
      .actions .btn { width: 100%; text-align: center; }
    }
  </style>
</head>
<body>

  <!-- Top Bar -->
  <div class="topbar">
    <h1>Roll Call Admin <span id="connStatus" style="font-size:12px; margin-left:8px; padding:3px 8px; border-radius:10px; background:rgba(244,67,54,0.3); color:#ef9a9a;">● Connecting...</span></h1>
    <div class="ip-badge" id="ipBadge">Loading...</div>
  </div>

  <div class="container">
    <!-- Tabs -->
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('home')">🏠 Home</button>
      <button class="tab-btn" onclick="switchTab('students')">👥 Students</button>
      <button class="tab-btn" onclick="switchTab('folders')">📁 Folders</button>
    </div>

    <!-- ======================== HOME TAB ======================== -->
    <div id="tab-home" class="tab-content active">
      <div class="card">
        <h2>📚 Subjects</h2>
        <div class="subject-grid" id="subjectGrid"></div>
        <div class="form-row">
          <input type="text" id="newSubjectName" placeholder="New subject name..." class="input-full" />
          <button class="btn btn-primary" onclick="addSubject()">+ Add</button>
        </div>
      </div>

      <!-- History -->
      <div class="card" id="historyCard" style="display:none;">
        <h2>📋 Roll Call History</h2>
        <div id="historyList"></div>
      </div>
    </div>

    <!-- ======================== SUBJECT DETAIL ======================== -->
    <div id="tab-subject-detail" class="tab-content">
      <button class="back-btn" onclick="switchTab('home')">← Back to subjects</button>

      <div class="card">
        <h2 id="subjectTitle">Subject</h2>
        <div class="actions">
          <button class="btn btn-success" id="startBtn" onclick="startRollCall()">🟢 Start Roll Call</button>
        </div>
      </div>

      <!-- Live Roll Call -->
      <div class="card" id="liveCard" style="display:none;">
        <div class="live-badge"><div class="dot"></div> LIVE</div>

        <div class="count-bar">
          <span>Present</span>
          <span><span class="num" id="presentCount">0</span> / <span id="totalCount">0</span></span>
        </div>

        <div class="actions">
          <button class="btn btn-primary btn-sm" onclick="showManualAdd()">➕ Manual Add</button>
          <button class="btn btn-outline btn-sm" onclick="exportExcel()">📊 Export Excel</button>
          <button class="btn btn-danger btn-sm" onclick="endRollCall()">🛑 End Roll Call</button>
        </div>

        <!-- Manual Add -->
        <div id="manualAddArea" style="display:none; margin-bottom: 16px;">
          <div class="form-row">
            <select id="manualStudentSelect" class="input-full">
              <option value="">-- Select student --</option>
            </select>
            <button class="btn btn-success btn-sm" onclick="manualAdd()">Add</button>
            <button class="btn btn-outline btn-sm" onclick="hideManualAdd()">Cancel</button>
          </div>
        </div>

        <div id="liveSubmissions"></div>
      </div>

      <!-- Past sessions -->
      <div class="card" id="pastSessionsCard">
        <h2>📅 Past Sessions</h2>
        <div id="pastSessionsList"></div>
      </div>
    </div>

    <!-- ======================== STUDENTS TAB ======================== -->
    <div id="tab-students" class="tab-content">
      <div class="card">
        <h2>👥 Student List (Shared)</h2>
        <p style="font-size:13px; color:rgba(255,255,255,0.5); margin-bottom:16px;">
          Same students for all subjects
        </p>

        <div class="form-row">
          <input type="text" id="studentName" placeholder="Student name" />
          <input type="text" id="studentRoll" placeholder="Roll number" />
          <button class="btn btn-primary" onclick="addStudent()">+ Add</button>
        </div>

        <div class="form-row" style="margin-top: 8px;">
          <input type="text" id="bulkInput" placeholder='Bulk: [{"name":"Aung","roll_number":"2001"},...]' class="input-full" />
          <button class="btn btn-outline" onclick="bulkAdd()">Bulk Add</button>
        </div>

        <div id="studentCount" style="margin: 12px 0; font-size:13px; color:rgba(255,255,255,0.5);"></div>
        <div id="studentList"></div>
      </div>
    </div>

    <!-- ======================== FOLDERS TAB ======================== -->
    <div id="tab-folders" class="tab-content">
      <div class="card">
        <h2>📁 Roll Call Folders</h2>
        <p style="font-size:13px; color:rgba(255,255,255,0.5); margin-bottom:16px;">
          Excel files saved on server. Send folder to teacher, then delete.
        </p>
        <div id="folderList"></div>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    // ── Socket.io ────────────────────────
    const socket = io(window.location.origin, {
      transports: ['websocket', 'polling'],
      reconnection: true,
      reconnectionDelay: 1000,
      reconnectionAttempts: 10,
    });

    let subjects = [];
    let students = [];
    let currentSubject = null;
    let currentSession = null;
    let submissions = [];
    let pollInterval = null;

    const connStatus = document.getElementById('connStatus');

    socket.on('connect', () => {
      connStatus.textContent = '● Live';
      connStatus.style.background = 'rgba(76,175,80,0.3)';
      connStatus.style.color = '#a5d6a7';
    });
    socket.on('disconnect', () => {
      connStatus.textContent = '● Offline';
      connStatus.style.background = 'rgba(244,67,54,0.3)';
      connStatus.style.color = '#ef9a9a';
    });

    socket.on('new-submission', (data) => {
      if (currentSession && data.session_id === currentSession.id) {
        if (!submissions.find(s => s.student_id === data.student_id)) {
          submissions.push(data);
          renderSubmissions();
          toast(`${data.name} checked in!`, 'success');
        }
      }
    });

    socket.on('session-ended', (data) => {
      if (currentSession && data.session_id === currentSession.id) {
        stopPolling();
        currentSession = null;
        document.getElementById('liveCard').style.display = 'none';
        document.getElementById('startBtn').style.display = 'inline-block';
        toast('Roll call ended', 'success');
        if (currentSubject) loadPastSessions(currentSubject.id);
      }
    });

    // ── Init ────────────────────────────
    async function init() {
      await loadSubjects();
      await loadStudents();
      document.getElementById('ipBadge').textContent = window.location.host;
    }
    init();

    // ── Tabs ────────────────────────────
    function switchTab(tab) {
      document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));

      if (tab === 'home') {
        document.getElementById('tab-home').classList.add('active');
        document.querySelectorAll('.tab-btn')[0].classList.add('active');
        loadHistory();
      } else if (tab === 'students') {
        document.getElementById('tab-students').classList.add('active');
        document.querySelectorAll('.tab-btn')[1].classList.add('active');
        loadStudents();
      } else if (tab === 'folders') {
        document.getElementById('tab-folders').classList.add('active');
        document.querySelectorAll('.tab-btn')[2].classList.add('active');
        loadFolders();
      } else if (tab === 'subject-detail') {
        document.getElementById('tab-subject-detail').classList.add('active');
      }
    }

    // ── Subjects ────────────────────────
    async function loadSubjects() {
      const res = await fetch('/api/subjects');
      subjects = await res.json();
      renderSubjects();
    }

    function renderSubjects() {
      const grid = document.getElementById('subjectGrid');
      if (subjects.length === 0) {
        grid.innerHTML = '<div class="empty"><div class="emoji">📚</div><p>No subjects yet. Add one below.</p></div>';
        return;
      }
      grid.innerHTML = subjects.map(s => `
        <div class="subject-card" onclick="openSubject(${s.id})">
          <button class="delete-btn" onclick="event.stopPropagation(); deleteSubject(${s.id})">×</button>
          <div class="subject-name">📖 ${s.name}</div>
          <div class="subject-meta">Click to manage roll calls</div>
        </div>
      `).join('');
    }

    async function addSubject() {
      const input = document.getElementById('newSubjectName');
      const name = input.value.trim();
      if (!name) return;
      try {
        await fetch('/api/subjects', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name }),
        });
        input.value = '';
        await loadSubjects();
        toast('Subject added!', 'success');
      } catch (err) {
        toast('Failed to add subject', 'error');
      }
    }

    async function deleteSubject(id) {
      if (!confirm('Delete this subject?')) return;
      await fetch(`/api/subjects/${id}`, { method: 'DELETE' });
      await loadSubjects();
      toast('Subject deleted', 'success');
    }

    // ── Subject Detail ──────────────────
    async function openSubject(id) {
      currentSubject = subjects.find(s => s.id === id);
      if (!currentSubject) return;

      switchTab('subject-detail');
      document.getElementById('subjectTitle').textContent = `📖 ${currentSubject.name}`;

      // Check for active session
      const res = await fetch(`/api/subjects/${id}/active-session`);
      currentSession = await res.json();

      if (currentSession) {
        showLiveSession();
      } else {
        document.getElementById('liveCard').style.display = 'none';
        document.getElementById('startBtn').style.display = 'inline-block';
      }

      loadPastSessions(id);
    }

    async function loadPastSessions(subjectId) {
      const res = await fetch(`/api/subjects/${subjectId}/sessions`);
      const sessions = await res.json();

      const list = document.getElementById('pastSessionsList');
      const card = document.getElementById('pastSessionsCard');

      if (sessions.length === 0) {
        card.style.display = 'none';
        return;
      }

      card.style.display = 'block';
      list.innerHTML = sessions.map(s => `
        <div class="list-item">
          <div class="info">
            <div class="name">${s.date} ${s.is_active ? '🟢' : ''}</div>
            <div class="meta">${s.present_count}/${s.total_count} present</div>
          </div>
          <button class="btn btn-outline btn-sm" onclick="exportSession(${s.id})">📊</button>
        </div>
      `).join('');
    }

    // ── Start / End Roll Call ───────────
    async function startRollCall() {
      const res = await fetch('/api/sessions', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ subject_id: currentSubject.id }),
      });
      currentSession = await res.json();
      showLiveSession();
      toast('Roll call started!', 'success');
    }

    function showLiveSession() {
      document.getElementById('liveCard').style.display = 'block';
      document.getElementById('startBtn').style.display = 'none';
      submissions = [];
      renderSubmissions();
      loadSubmissions();
      loadStudentsForManual();
      // Auto-poll every 2 seconds as live backup
      startPolling();
    }

    function startPolling() {
      stopPolling();
      pollInterval = setInterval(async () => {
        if (!currentSession) return;
        await loadSubmissions();
      }, 2000);
    }

    function stopPolling() {
      if (pollInterval) {
        clearInterval(pollInterval);
        pollInterval = null;
      }
    }

    async function endRollCall() {
      if (!currentSession) return;
      if (!confirm('End this roll call?')) return;

      stopPolling();
      await fetch(`/api/sessions/${currentSession.id}/end`, { method: 'PATCH' });
      currentSession = null;
      document.getElementById('liveCard').style.display = 'none';
      document.getElementById('startBtn').style.display = 'inline-block';
      toast('Roll call ended', 'success');
      loadPastSessions(currentSubject.id);
    }

    // ── Submissions ─────────────────────
    async function loadSubmissions() {
      if (!currentSession) return;
      const res = await fetch(`/api/sessions/${currentSession.id}/submissions`);
      const newData = await res.json();

      // Detect new students and show toast
      if (newData.length > submissions.length) {
        const existingIds = new Set(submissions.map(s => s.student_id));
        const newStudents = newData.filter(s => !existingIds.has(s.student_id));
        newStudents.forEach(s => toast(`${s.name} checked in!`, 'success'));
      }

      submissions = newData;
      renderSubmissions();
    }

    function renderSubmissions() {
      const totalStudents = students.length;
      document.getElementById('presentCount').textContent = submissions.length;
      document.getElementById('totalCount').textContent = totalStudents;

      const list = document.getElementById('liveSubmissions');
      if (submissions.length === 0) {
        list.innerHTML = '<div class="empty"><div class="emoji">⏳</div><p>Waiting for students...</p></div>';
        return;
      }
      list.innerHTML = submissions.map(s => `
        <div class="sub-item">
          <span class="check">✅</span>
          <span class="sub-name">${s.name}</span>
          <span class="sub-roll">Roll: ${s.roll_number}</span>
          <span class="sub-method ${s.method}">${s.method === 'manual' ? 'Manual' : 'Self'}</span>
          <span class="sub-time">${formatTime(s.submitted_at)}</span>
        </div>
      `).join('');
    }

    function formatTime(ts) {
      if (!ts) return '';
      const d = new Date(ts);
      return d.toLocaleTimeString('en', { hour: '2-digit', minute: '2-digit' });
    }

    // ── Manual Add ──────────────────────
    async function loadStudentsForManual() {
      if (!currentSession) return;
      const res = await fetch(`/api/sessions/${currentSession.id}/submissions`);
      const subs = await res.json();
      const presentIds = new Set(subs.map(s => s.student_id));

      const select = document.getElementById('manualStudentSelect');
      select.innerHTML = '<option value="">-- Select student --</option>';
      students
        .filter(s => !presentIds.has(s.id))
        .forEach(s => {
          const opt = document.createElement('option');
          opt.value = s.id;
          opt.textContent = `${s.name} (Roll: ${s.roll_number})`;
          select.appendChild(opt);
        });
    }

    function showManualAdd() {
      document.getElementById('manualAddArea').style.display = 'block';
      loadStudentsForManual();
    }
    function hideManualAdd() {
      document.getElementById('manualAddArea').style.display = 'none';
    }

    async function manualAdd() {
      const select = document.getElementById('manualStudentSelect');
      const studentId = parseInt(select.value);
      if (!studentId) return;

      const res = await fetch(`/api/sessions/${currentSession.id}/manual-add`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ student_id: studentId }),
      });
      const data = await res.json();
      if (res.ok) {
        toast('Student added!', 'success');
        hideManualAdd();
        loadSubmissions();
      } else {
        toast(data.error, 'error');
      }
    }

    // ── Export ───────────────────────────
    function exportExcel() {
      if (!currentSession) return;
      window.open(`/api/sessions/${currentSession.id}/export`, '_blank');
    }

    function exportSession(sessionId) {
      window.open(`/api/sessions/${sessionId}/export`, '_blank');
    }

    // ── History ─────────────────────────
    async function loadHistory() {
      // Show recent sessions across all subjects
      const card = document.getElementById('historyCard');
      const list = document.getElementById('historyList');
      card.style.display = 'block';

      let allSessions = [];
      for (const sub of subjects) {
        const res = await fetch(`/api/subjects/${sub.id}/sessions`);
        const sessions = await res.json();
        sessions.forEach(s => s.subject_name = sub.name);
        allSessions.push(...sessions);
      }

      allSessions.sort((a, b) => b.date.localeCompare(a.date));

      if (allSessions.length === 0) {
        list.innerHTML = '<div class="empty"><div class="emoji">📋</div><p>No roll call history yet.</p></div>';
        return;
      }

      list.innerHTML = allSessions.slice(0, 10).map(s => `
        <div class="list-item">
          <div class="info">
            <div class="name">${s.subject_name} — ${s.date} ${s.is_active ? '🟢' : ''}</div>
            <div class="meta">${s.present_count}/${s.total_count} present</div>
          </div>
          <button class="btn btn-outline btn-sm" onclick="exportSession(${s.id})">📊</button>
        </div>
      `).join('');
    }

    // ── Students ────────────────────────
    async function loadStudents() {
      const res = await fetch('/api/students');
      students = await res.json();
      renderStudents();
    }

    function renderStudents() {
      const list = document.getElementById('studentList');
      const count = document.getElementById('studentCount');
      count.textContent = `Total: ${students.length} students`;

      if (students.length === 0) {
        list.innerHTML = '<div class="empty"><div class="emoji">👤</div><p>No students yet.</p></div>';
        return;
      }

      list.innerHTML = students.map(s => `
        <div class="list-item">
          <div class="info">
            <div class="name">${s.name}</div>
            <div class="meta">Roll: ${s.roll_number}</div>
          </div>
          <button class="btn btn-danger btn-sm" onclick="deleteStudent(${s.id})">×</button>
        </div>
      `).join('');
    }

    async function addStudent() {
      const nameInput = document.getElementById('studentName');
      const rollInput = document.getElementById('studentRoll');
      const name = nameInput.value.trim();
      const roll = rollInput.value.trim();
      if (!name || !roll) return toast('Name and roll required', 'error');

      const res = await fetch('/api/students', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, roll_number: roll }),
      });
      const data = await res.json();
      if (res.ok) {
        nameInput.value = '';
        rollInput.value = '';
        await loadStudents();
        toast('Student added!', 'success');
      } else {
        toast(data.error, 'error');
      }
    }

    async function deleteStudent(id) {
      if (!confirm('Delete this student?')) return;
      await fetch(`/api/students/${id}`, { method: 'DELETE' });
      await loadStudents();
      toast('Student deleted', 'success');
    }

    async function bulkAdd() {
      const input = document.getElementById('bulkInput');
      try {
        const students = JSON.parse(input.value);
        const res = await fetch('/api/students/bulk', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ students }),
        });
        const data = await res.json();
        input.value = '';
        await loadStudents();
        toast(`Added ${data.added} students!`, 'success');
      } catch (err) {
        toast('Invalid JSON format', 'error');
      }
    }

    // ── Folders ─────────────────────────
    async function loadFolders() {
      const res = await fetch('/api/folders');
      const folders = await res.json();
      const list = document.getElementById('folderList');

      if (folders.length === 0) {
        list.innerHTML = '<div class="empty"><div class="emoji">📁</div><p>No roll call folders yet.<br>Export a roll call to create one.</p></div>';
        return;
      }

      list.innerHTML = folders.map(f => `
        <div class="list-item" style="flex-direction:column; align-items:stretch;">
          <div style="display:flex; justify-content:space-between; align-items:center;">
            <div>
              <div class="name">📁 ${f.name}</div>
              <div class="meta">${f.fileCount} file${f.fileCount > 1 ? 's' : ''}</div>
            </div>
            <div style="display:flex; gap:8px;">
              <button class="btn btn-danger btn-sm" onclick="deleteFolder('${f.name}')">🗑️ Delete</button>
            </div>
          </div>
          <div style="margin-top:10px; padding-top:10px; border-top:1px solid rgba(255,255,255,0.08);">
            ${f.files.map(file => `
              <div style="display:flex; justify-content:space-between; padding:4px 0; font-size:13px; color:rgba(255,255,255,0.6);">
                <span>📄 ${file.name}</span>
                <span>${formatFileSize(file.size)}</span>
              </div>
            `).join('')}
          </div>
        </div>
      `).join('');
    }

    function formatFileSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    }

    async function deleteFolder(subject) {
      if (!confirm(`Delete "${subject}" folder?\n\nAll Excel files inside will be permanently deleted.`)) return;

      const res = await fetch(`/api/folders/${encodeURIComponent(subject)}`, { method: 'DELETE' });
      const data = await res.json();

      if (res.ok) {
        toast(`"${subject}" folder deleted`, 'success');
        loadFolders();
      } else {
        toast(data.error || 'Failed to delete', 'error');
      }
    }

    // ── Toast ───────────────────────────
    function toast(msg, type = 'success') {
      const el = document.createElement('div');
      el.className = `toast ${type}`;
      el.textContent = msg;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 3000);
    }
  </script>
</body>
</html>
